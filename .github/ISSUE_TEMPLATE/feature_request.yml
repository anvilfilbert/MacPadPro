name: Feature request
description: Suggest a MacPad Pro feature or extension
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the feature or extension.
    validations:
      required: true
  - type: dropdown
    id: extension
    attributes:
      label: Extension type
      options:
        - New downloadable extension
        - Existing extension improvement
        - Core app behavior
        - Documentation
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Data and privacy
      description: Does the feature store or send document, clipboard, backup, or AI data?
