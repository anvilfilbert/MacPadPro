name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build and Test
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift Tests
        run: swift test --quiet

      - name: Build App Bundle
        run: ./scripts/build-app.sh

      - name: Package Release Zip
        run: ./scripts/package-release.sh
